# Advanced Supply Chain Automation Platform
# Docker Compose for complete local development and production setup

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: supplychain-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: supplychain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supplychain-network

  # Redis for caching and message broker
  redis:
    image: redis:7-alpine
    container_name: supplychain-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supplychain-network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: supplychain-api
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/supplychain
      
      # Redis
      REDIS_URL: redis://redis:6379/0
      
      # Celery
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      
      # Application
      APP_NAME: "Supply Chain Automation Platform"
      APP_VERSION: "1.0.0"
      DEBUG: "false"
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      
      # Inventory
      LOW_STOCK_THRESHOLD: 10
      CRITICAL_STOCK_THRESHOLD: 5
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn api.main:app 
      --host 0.0.0.0 
      --port 8000
      --workers 4
    networks:
      - supplychain-network
    restart: unless-stopped

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: supplychain-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/supplychain
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      LOG_LEVEL: INFO
    depends_on:
      - postgres
      - redis
    command: >
      celery -A workers.celery_app worker 
      --loglevel=info 
      --queues=default,sync,automations,high_priority
      --concurrency=4
      --hostname=worker@%h
    networks:
      - supplychain-network
    restart: unless-stopped
    deploy:
      replicas: 2  # Scale workers as needed

  # Celery Beat (Scheduler)
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: supplychain-beat
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/supplychain
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
    depends_on:
      - postgres
      - redis
    command: >
      celery -A workers.celery_app beat 
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
    volumes:
      - celery_beat_data:/app/celerybeat-data
    networks:
      - supplychain-network
    restart: unless-stopped

  # Flower - Celery Monitoring
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: supplychain-flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: >
      celery -A workers.celery_app flower 
      --port=5555
      --broker_api=redis://redis:6379/1
    networks:
      - supplychain-network
    restart: unless-stopped

  # Nginx Reverse Proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: supplychain-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - supplychain-network
    restart: unless-stopped
    profiles:
      - production  # Only start in production profile

volumes:
  postgres_data:
  redis_data:
  celery_beat_data:

networks:
  supplychain-network:
    driver: bridge
